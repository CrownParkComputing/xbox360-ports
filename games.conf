# XBLA recomp retest suite — configuration
#
# SDK_SRC: path to the ReXGlue SDK source tree to build against.
#   Default points at the in-repo submodule (rexglue-sdk/). To retest against a
#   NEW ReXGlue release: cd rexglue-sdk && git fetch && git checkout <ref> &&
#   git submodule update --init --recursive, then run ./retest.sh.
#   (You may instead point this at an existing local clone to reuse its build.)
SDK_SRC=./rexglue-sdk

# One line per game:
#   name | manifest | package_dir (the .../000D0000 folder holding the STFS package) | known_status
