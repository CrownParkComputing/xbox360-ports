# Guest CRT setjmp/longjmp — codegen redirects these to host setjmp/longjmp
# (ppc_setjmp/ppc_longjmp). Without this, the XDK image decoder's format-probe
# error path (longjmp) corrupts the guest stack and the game dies on a null
# object (the "spin bug" / silent fault loop).
setjmp_address = 0x82151900
longjmp_address = 0x821513C0

[analysis]
max_jump_extension = 65536
data_region_threshold = 16

[functions]
0x82089EB0 = {}
0x8211F8E8 = {}
0x821045D8 = {}
