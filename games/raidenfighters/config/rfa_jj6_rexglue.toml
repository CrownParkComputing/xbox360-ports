# jj6.xex — Raiden Fighters game module. setjmp/longjmp: fill in from the
# generated code if it black-screens (grep 'REX_STORE_U64(ctx.r3.u32 + 0, ctx.f14.u64)').
[analysis]
# The jjN images embed large data blobs in executable regions; without this the
# blobs get discovered as overlapping multi-MB garbage functions (jj6: 50+ min
# write; jj7: std::bad_alloc).
reject_data_functions = true
max_jump_extension = 65536
data_region_threshold = 16

