[analysis]
max_jump_extension = 65536
data_region_threshold = 16

# No hints needed. The engine's data (.rdata/.pdata, including the 56-arm
# format-parser jump table at 0x881118F8 for the bctr at 0x888C6644) decodes
# natively now that codegen snapshots each module's image right after its own
# load: SKIPPER.DLL's base 0x98000000 aliases the engine's 0x88000000 range
# (same physical backing, 4K- vs 64K-page views), so loading skipper second
# used to overwrite the engine's entire .rdata/.pdata in codegen's view.
[functions]
# Dispatched via ctr from 0x88210EE0 (CRT startup area) during engine DllMain;
# reached only through a runtime-computed pointer so discovery can't see it.
0x8862B100 = {}
